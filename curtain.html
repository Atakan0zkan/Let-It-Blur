<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Let It Blur - Screen Hidden</title>
    <link rel="stylesheet" href="curtain.css">
  </head>
  <body>
    <main class="curtain">
      <section class="panel" aria-labelledby="curtainTitle">
        <p class="eyebrow">Let It Blur</p>
        <h1 id="curtainTitle">Screen hidden</h1>
        <p class="copy">This curtain is shown when the current browser page cannot be blurred directly.</p>
        <button id="closeCurtain" type="button">Close curtain</button>
      </section>
    </main>

    <script src="curtain.js"></script>
  </body>
</html>
